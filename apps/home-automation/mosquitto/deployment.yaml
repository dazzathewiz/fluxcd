---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: home-automation
  name: mosquitto
  labels:
    app: mosquitto
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate  # Don't use RollingUpdate because PVC can only be mounted by one pod at a time
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      securityContext:
        runAsUser: 1883
        runAsGroup: 1883
        fsGroup: 1883
      initContainers:
      - name: init-auth   # *workaround*: This container copies the password file from the secret with correct permissions, which doesn't otherwise work using the mosquitto container config
        image: busybox
        command: ['sh', '-c', 'cp /tmp/secret/passwordfile.txt /mosquitto/auth/passwordfile.txt && chown 1883:1883 /mosquitto/auth/passwordfile.txt && chmod 0600 /mosquitto/auth/passwordfile.txt']
        volumeMounts:
        - name: password
          mountPath: /tmp/secret
        - name: password-writable
          mountPath: /mosquitto/auth
      containers:
      - name: mosquitto
        image: eclipse-mosquitto:2
        volumeMounts:
        - name: config
          mountPath: /mosquitto/config/
        - name: password-writable
          mountPath: /mosquitto/auth/
        - name: data
          mountPath: /mosquitto/data/
        ports:
          - containerPort: 1883
      volumes:
      - name: config
        configMap:
          name: mosquitto-config
      - name: password
        secret:
          secretName: mosquitto-secret
          defaultMode: 0600
      - name: password-writable   # *workaround*: This emptyDir volume is used to provide a writable mount for the password file, which is copied from the secret by the init container
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: mosquitto-pvc
